name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: gradle build

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: allaymc-land-claim-remastered
          path: build/libs/*.jar
